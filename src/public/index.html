<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpecReadr</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <img id="brandLogo" class="brand-logo" src="/assets/logo.svg" alt="Logo" />
          <div class="brand-text">
            <h1 class="brand">SpecReadr</h1>
            <p class="brand-sub">OpenSpec 设计审阅台</p>
          </div>
        </div>

        <div class="sidebar-section">
          <h2>工作区</h2>
          <select id="workspaceSelect"></select>
          <p id="scanMeta" class="meta-line"></p>
          <p id="runtimeMeta" class="meta-line"></p>
          <details class="ops-drawer">
            <summary>低频操作</summary>
            <div class="ops-grid">
              <button id="removeWorkspaceBtn">解绑当前工作区</button>
              <button id="clearWorkspacesBtn">清空所有工作区</button>
              <button id="stopServiceBtn">停止服务</button>
            </div>
          </details>
        </div>

        <div class="sidebar-section">
          <div class="section-head">
            <h2>导航</h2>
            <div class="segmented">
              <button id="modeCardsBtn" class="active">变更卡片</button>
              <button id="modeFilesBtn">文件列表</button>
            </div>
          </div>
          <div class="nav-tools">
            <input id="navSearchInput" placeholder="筛选变更 / 能力 / 文件" />
          </div>
          <div id="navContent" class="sidebar-content"></div>
        </div>
      </aside>

      <section class="workspace-shell">
        <header class="topbar">
          <div>
            <h2>OpenSpec 审阅工作台</h2>
            <p>Change-first 推进，Capability 全局视角</p>
          </div>
        </header>

        <section class="sync-center">
          <div class="sync-form">
            <input id="addWorkspacePath" placeholder="工作区路径，例如 /path/to/workspace" />
            <input id="addWorkspaceLabel" placeholder="显示名称（可选）" />
            <button id="syncAddBtn" class="primary">添加并刷新</button>
            <button id="refreshWorkspaceBtn">刷新当前</button>
            <button id="refreshAllBtn">刷新全部</button>
          </div>
          <div class="sync-status-row">
            <span id="syncStateBadge" class="sync-badge">空闲</span>
            <span id="syncStateText" class="sync-text">等待同步操作</span>
          </div>
        </section>

        <section class="actionbar">
          <div class="reader-switch">
            <span>阅读模式</span>
            <div class="segmented">
              <button id="viewStoryBtn" class="active">串读</button>
              <button id="viewCompareBtn">并排</button>
            </div>
          </div>
          <span class="muted">聚焦：变更、能力、文件</span>
        </section>

        <main class="content-grid">
          <section class="panel reader-panel">
            <div class="panel-head">
              <h3>阅读区</h3>
              <span class="readonly">只读</span>
            </div>
            <div id="readerContent" class="panel-content"></div>
          </section>

          <aside class="panel lens-panel">
            <div class="panel-head">
              <h3>能力与时间线</h3>
            </div>
            <div id="lensContent" class="panel-content"></div>
          </aside>
        </main>
      </section>
    </div>

    <script src="/app.js" type="module"></script>
  </body>
</html>
