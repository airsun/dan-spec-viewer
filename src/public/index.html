<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpecReadr</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand-row">
          <img id="brandLogo" class="brand-logo" src="/assets/logo.svg" alt="Logo" />
          <div class="brand-text">
            <h1 class="brand">SpecReadr</h1>
            <p class="brand-sub">OpenSpec 设计审阅台</p>
          </div>
        </div>

        <div class="sidebar-section">
          <h2>工作区</h2>
          <div class="workspace-control-row">
            <div class="workspace-combo" id="workspaceComboWrap">
              <input id="workspaceCombo" autocomplete="off" placeholder="输入名称/路径，模糊检索并选择工作区" />
              <button id="workspaceComboToggle" type="button" aria-label="展开工作区列表">▾</button>
              <div id="workspaceDropdown" class="workspace-dropdown"></div>
            </div>
            <button id="refreshWorkspaceBtn" class="icon-btn" type="button" title="刷新当前工作区" aria-label="刷新当前工作区">↻</button>
            <details id="workspaceMenu" class="workspace-menu">
              <summary title="工作区低频操作" aria-label="工作区低频操作">⋯</summary>
              <div class="workspace-menu-list">
                <button id="removeWorkspaceBtn">解绑当前工作区</button>
              </div>
            </details>
          </div>
        </div>

        <div class="sidebar-section">
          <div class="section-head">
            <h2>导航</h2>
            <div class="segmented">
              <button id="modeCardsBtn" class="active">变更卡片</button>
              <button id="modeFilesBtn">文件列表</button>
            </div>
          </div>
          <div class="nav-tools">
            <input id="navSearchInput" placeholder="筛选变更 / 能力 / 文件" />
          </div>
          <div id="navContent" class="sidebar-content"></div>
        </div>
        <div class="sidebar-footer">
          <div id="scanMeta" class="meta-line"></div>
          <div id="runtimeMeta" class="meta-line"></div>
        </div>
      </aside>

      <section class="workspace-shell">
        <header class="topbar">
          <div class="topbar-title">
            <h2>OpenSpec 审阅工作台</h2>
            <p>Change-first 推进，Capability 全局视角</p>
          </div>
          <div class="topbar-actions">
            <div class="sync-mini" aria-live="polite">
              <span id="syncStateBadge" class="sync-badge">空闲</span>
              <span id="syncStateText" class="sync-text">等待同步操作</span>
            </div>
            <details id="syncPopover" class="sync-popover">
              <summary title="同步中心" aria-label="打开同步中心">
                <span class="sync-summary-icon">⟳</span>
                <span class="sync-summary-text">同步</span>
              </summary>
              <div class="sync-popover-panel">
                <h3>绑定与索引</h3>
                <div class="sync-form">
                  <input id="addWorkspacePath" placeholder="工作区路径，例如 /path/to/workspace" />
                  <input id="addWorkspaceLabel" placeholder="显示名称（可选）" />
                  <button id="syncAddBtn" class="primary">添加并刷新</button>
                </div>
                <div class="sync-actions">
                  <button id="refreshAllBtn">刷新全部</button>
                </div>
                <div class="sync-danger">
                  <h3>全局低频操作</h3>
                  <button id="clearWorkspacesBtn">解绑全部工作区</button>
                  <button id="stopServiceBtn">停止服务</button>
                </div>
              </div>
            </details>
          </div>
        </header>

        <main class="content-grid">
          <section class="panel reader-panel">
            <div class="panel-head">
              <div class="panel-head-left">
                <h3>阅读区</h3>
                <span class="readonly">只读</span>
              </div>
              <div class="reader-mode-inline">
                <span>阅读模式</span>
                <div class="segmented">
                  <button id="viewStoryBtn" class="active">串读</button>
                  <button id="viewCompareBtn">并排</button>
                </div>
              </div>
            </div>
            <div id="readerContent" class="panel-content"></div>
          </section>

          <aside class="panel lens-panel">
            <div class="panel-head">
              <h3>能力与时间线</h3>
            </div>
            <div id="lensContent" class="panel-content"></div>
          </aside>
        </main>
      </section>
    </div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
